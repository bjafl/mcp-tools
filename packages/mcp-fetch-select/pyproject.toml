[project]
name = "mcp-fetch-select"
version = "0.1.0"
description = "MCP server that fetches a URL and returns elements matching a CSS selector"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.0.0",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
]

[project.scripts]
mcp-fetch-select = "mcp_fetch_select:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_fetch_select"]
