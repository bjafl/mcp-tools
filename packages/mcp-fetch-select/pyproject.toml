[project]
name = "mcp-fetch-select"
version = "0.1.0"
description = "MCP server that fetches a URL and returns elements matching a CSS selector"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.0.0",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
]

[project.scripts]
mcp-fetch-select = "mcp_fetch_select:main"


[build-system]
requires = ["uv_build>=0.11.13,<0.12"]
build-backend = "uv_build"