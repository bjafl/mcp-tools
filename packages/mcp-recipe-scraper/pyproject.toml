[project]
name = "mcp-recipe-scraper"
version = "0.1.0"
description = "MCP server that scrapes structured recipe data from a URL"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.0.0",
    "recipe-scrapers>=15.0",
]

[project.scripts]
mcp-recipe-scraper = "mcp_recipe_scraper:main"

[build-system]
requires = ["uv_build>=0.11.13,<0.12"]
build-backend = "uv_build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_recipe_scraper"]
